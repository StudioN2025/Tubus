<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой браузер | Google/Yandex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .browser-container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Панель инструментов */
        .toolbar {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            color: #495057;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #e9ecef;
            color: #212529;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Адресная строка */
        .address-bar {
            flex: 1;
            display: flex;
            gap: 10px;
            background: white;
            border-radius: 25px;
            padding: 5px 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }

        .address-bar:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #url-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            padding: 10px 0;
            color: #495057;
        }

        #go-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #667eea;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #go-btn:hover {
            background: #f0f2f5;
        }

        /* Поисковые системы */
        .search-engines {
            display: flex;
            gap: 10px;
            background: white;
            padding: 5px;
            border-radius: 25px;
            border: 2px solid #e9ecef;
        }

        .search-engine {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: white;
        }

        .search-engine.google {
            background: #4285f4;
        }

        .search-engine.google:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }

        .search-engine.yandex {
            background: #ff0000;
        }

        .search-engine.yandex:hover {
            background: #cc0000;
            transform: translateY(-2px);
        }

        .search-engine.active {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        /* Панель закладок */
        .bookmarks-bar {
            background: white;
            padding: 10px 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 15px;
            align-items: center;
            overflow-x: auto;
        }

        .bookmark {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: #f8f9fa;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .bookmark:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .bookmark.google {
            background: #4285f4;
            color: white;
        }

        .bookmark.yandex {
            background: #ff0000;
            color: white;
        }

        .bookmark-icon {
            font-size: 16px;
        }

        .add-bookmark {
            background: none;
            border: 2px dashed #ced4da;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            color: #6c757d;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .add-bookmark:hover {
            border-color: #667eea;
            color: #667eea;
        }

        /* Область просмотра */
        .browser-view {
            flex: 1;
            background: white;
            position: relative;
        }

        #browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Статус бар */
        .status-bar {
            background: #f8f9fa;
            padding: 8px 20px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            color: #6c757d;
            font-size: 12px;
        }

        .loading {
            color: #667eea;
            display: none;
        }

        .loading.active {
            display: inline;
        }

        /* Модальное окно для добавления закладки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .modal-btn.save {
            background: #667eea;
            color: white;
        }

        .modal-btn.save:hover {
            background: #5a67d8;
        }

        .modal-btn.cancel {
            background: #e9ecef;
            color: #495057;
        }

        .modal-btn.cancel:hover {
            background: #dee2e6;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <!-- Панель инструментов -->
        <div class="toolbar">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="goBack()" id="back-btn" disabled>←</button>
                <button class="nav-btn" onclick="goForward()" id="forward-btn" disabled>→</button>
                <button class="nav-btn" onclick="refresh()">↻</button>
            </div>
            
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="Введите URL или поисковый запрос...">
                <button id="go-btn" onclick="navigate()">→</button>
            </div>

            <div class="search-engines">
                <button class="search-engine google active" onclick="setSearchEngine('google')">Google</button>
                <button class="search-engine yandex" onclick="setSearchEngine('yandex')">Яндекс</button>
            </div>
        </div>

        <!-- Панель закладок -->
        <div class="bookmarks-bar" id="bookmarks-bar">
            <div class="bookmark google" onclick="loadUrl('https://www.google.com')">
                <span class="bookmark-icon">G</span>
                <span>Google</span>
            </div>
            <div class="bookmark yandex" onclick="loadUrl('https://yandex.ru')">
                <span class="bookmark-icon">Я</span>
                <span>Яндекс</span>
            </div>
            <button class="add-bookmark" onclick="showBookmarkModal()">+ Добавить закладку</button>
        </div>

        <!-- Область просмотра -->
        <div class="browser-view">
            <iframe id="browser-frame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-top-navigation"></iframe>
        </div>

        <!-- Статус бар -->
        <div class="status-bar">
            <span id="current-url"></span>
            <span class="loading" id="loading">Загрузка...</span>
        </div>
    </div>

    <!-- Модальное окно для добавления закладки -->
    <div class="modal" id="bookmark-modal">
        <div class="modal-content">
            <h3>Добавить закладку</h3>
            <input type="text" id="bookmark-name" placeholder="Название">
            <input type="text" id="bookmark-url" placeholder="URL">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideBookmarkModal()">Отмена</button>
                <button class="modal-btn save" onclick="addBookmark()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // Текущая поисковая система
        let currentSearchEngine = 'google';
        
        // История навигации
        let history = [];
        let currentIndex = -1;
        
        // Закладки
        let bookmarks = [
            { name: 'Google', url: 'https://www.google.com', color: 'google' },
            { name: 'Яндекс', url: 'https://yandex.ru', color: 'yandex' }
        ];

        // Инициализация
        window.onload = function() {
            updateBookmarksBar();
            loadUrl('https://www.google.com');
        };

        // Установка поисковой системы
        function setSearchEngine(engine) {
            currentSearchEngine = engine;
            document.querySelectorAll('.search-engine').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.search-engine.${engine}`).classList.add('active');
        }

        // Навигация
        function navigate() {
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;

            let url;
            
            // Проверяем, является ли ввод URL
            if (input.match(/^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/)) {
                url = input.startsWith('http') ? input : 'https://' + input;
            } else {
                // Если не URL, выполняем поиск
                url = getSearchUrl(input);
            }
            
            loadUrl(url);
        }

        // Получение URL поиска в зависимости от выбранной системы
        function getSearchUrl(query) {
            const encodedQuery = encodeURIComponent(query);
            if (currentSearchEngine === 'google') {
                return `https://www.google.com/search?q=${encodedQuery}`;
            } else {
                return `https://yandex.ru/search/?text=${encodedQuery}`;
            }
        }

        // Загрузка URL
        function loadUrl(url) {
            const iframe = document.getElementById('browser-frame');
            const loading = document.getElementById('loading');
            const urlInput = document.getElementById('url-input');
            const currentUrlSpan = document.getElementById('current-url');
            
            loading.classList.add('active');
            
            iframe.src = url;
            urlInput.value = url;
            currentUrlSpan.textContent = url;
            
            // Добавляем в историю
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(url);
            currentIndex = history.length - 1;
            
            updateNavButtons();
            
            // Обработчик загрузки iframe
            iframe.onload = function() {
                loading.classList.remove('active');
                try {
                    const iframeUrl = iframe.contentWindow.location.href;
                    urlInput.value = iframeUrl;
                    currentUrlSpan.textContent = iframeUrl;
                } catch(e) {
                    // Игнорируем ошибки кросс-домена
                }
            };
            
            iframe.onerror = function() {
                loading.classList.remove('active');
                alert('Ошибка загрузки страницы');
            };
        }

        // Навигация назад
        function goBack() {
            if (currentIndex > 0) {
                currentIndex--;
                document.getElementById('browser-frame').src = history[currentIndex];
                updateNavButtons();
            }
        }

        // Навигация вперед
        function goForward() {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                document.getElementById('browser-frame').src = history[currentIndex];
                updateNavButtons();
            }
        }

        // Обновление страницы
        function refresh() {
            const iframe = document.getElementById('browser-frame');
            iframe.src = iframe.src;
        }

        // Обновление состояния кнопок навигации
        function updateNavButtons() {
            document.getElementById('back-btn').disabled = currentIndex <= 0;
            document.getElementById('forward-btn').disabled = currentIndex >= history.length - 1;
        }

        // Показать модальное окно для закладки
        function showBookmarkModal() {
            document.getElementById('bookmark-modal').classList.add('active');
            document.getElementById('bookmark-name').value = '';
            document.getElementById('bookmark-url').value = '';
        }

        // Скрыть модальное окно
        function hideBookmarkModal() {
            document.getElementById('bookmark-modal').classList.remove('active');
        }

        // Добавить закладку
        function addBookmark() {
            const name = document.getElementById('bookmark-name').value.trim();
            let url = document.getElementById('bookmark-url').value.trim();
            
            if (!name || !url) {
                alert('Заполните все поля');
                return;
            }
            
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            bookmarks.push({ name, url, color: 'custom' });
            updateBookmarksBar();
            hideBookmarkModal();
        }

        // Обновить панель закладок
        function updateBookmarksBar() {
            const bar = document.getElementById('bookmarks-bar');
            // Очищаем панель, оставляя только кнопку добавления
            while (bar.children.length > 3) {
                bar.removeChild(bar.lastChild);
            }
            
            // Добавляем закладки
            bookmarks.forEach((bookmark, index) => {
                if (index < 2) return; // Пропускаем первые две (стандартные)
                
                const bookmarkEl = document.createElement('div');
                bookmarkEl.className = `bookmark ${bookmark.color}`;
                bookmarkEl.onclick = () => loadUrl(bookmark.url);
                bookmarkEl.innerHTML = `
                    <span class="bookmark-icon">★</span>
                    <span>${bookmark.name}</span>
                `;
                
                // Вставляем перед кнопкой добавления
                bar.insertBefore(bookmarkEl, bar.lastChild);
            });
        }

        // Обработка нажатия Enter в поле ввода
        document.getElementById('url-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                navigate();
            }
        });

        // Предотвращаем навигацию в iframe
        document.getElementById('browser-frame').addEventListener('load', function() {
            try {
                const url = this.contentWindow.location.href;
                document.getElementById('url-input').value = url;
                document.getElementById('current-url').textContent = url;
            } catch(e) {
                // Игнорируем ошибки кросс-домена
            }
        });
    </script>
</body>
</html>
