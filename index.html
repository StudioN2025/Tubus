<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TUBUS - Браузер с поиском</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .browser-container {
            width: 100%;
            max-width: 1200px;
            height: 98vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .browser-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .browser-logo {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .browser-logo h1 {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .browser-logo span {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
        }

        .header-time {
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 16px;
        }

        /* Панель навигации */
        .nav-bar {
            background: #f8f9fa;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
        }

        .nav-buttons {
            display: flex;
            gap: 2px;
            background: white;
            padding: 3px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 18px;
            color: #495057;
            min-width: 36px;
        }

        .nav-btn:active {
            background: #e9ecef;
        }

        .nav-btn:disabled {
            opacity: 0.3;
        }

        /* АДРЕСНАЯ СТРОКА (для URL) */
        .address-bar {
            flex: 1;
            display: flex;
            background: white;
            border-radius: 22px;
            padding: 2px 10px;
            border: 2px solid #e9ecef;
        }

        #url-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 13px;
            padding: 8px 0;
            color: #495057;
            background: transparent;
        }

        #go-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #4ecdc4;
            padding: 6px 8px;
        }

        /* ПОИСКОВАЯ СТРОКА (отдельная) */
        .search-section {
            background: white;
            padding: 12px 16px;
            border-bottom: 2px solid #f0f0f0;
        }

        .search-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-engine-badge {
            background: #4ecdc4;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #search-input {
            flex: 1;
            height: 44px;
            border: 2px solid #e9ecef;
            border-radius: 22px;
            padding: 0 18px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        #search-input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        #search-btn {
            background: #4ecdc4;
            border: none;
            border-radius: 22px;
            padding: 0 22px;
            height: 44px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #search-btn:active {
            background: #45b7b0;
            transform: scale(0.98);
        }

        /* Переключатели поисковых систем */
        .search-tabs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            padding: 0 4px;
        }

        .search-tab {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .search-tab.google {
            background: #4285f4;
            opacity: 0.7;
        }

        .search-tab.google.active {
            opacity: 1;
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
        }

        .search-tab.yandex {
            background: #ff0000;
            opacity: 0.7;
        }

        .search-tab.yandex.active {
            opacity: 1;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
        }

        /* Закладки */
        .bookmarks-bar {
            background: white;
            padding: 8px 12px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .bookmark {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: #f8f9fa;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            border: 1px solid #dee2e6;
        }

        .bookmark:active {
            background: #e9ecef;
        }

        .add-bookmark {
            border: 2px dashed #ced4da;
            background: none;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            color: #6c757d;
        }

        /* Область просмотра */
        .browser-view {
            flex: 1;
            background: #f5f5f5;
            overflow-y: auto;
            padding: 16px;
        }

        /* Карточки быстрого поиска */
        .quick-search {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .quick-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
        }

        .quick-card.google-card {
            background: #4285f4;
        }

        .quick-card.yandex-card {
            background: #ff0000;
        }

        .quick-card h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .quick-card p {
            font-size: 11px;
            opacity: 0.9;
        }

        /* История поиска */
        .search-history {
            background: white;
            border-radius: 16px;
            padding: 16px;
        }

        .history-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .history-item:active {
            background: #f8f9fa;
        }

        .history-item span {
            font-size: 13px;
            color: #333;
        }

        .history-item small {
            font-size: 10px;
            color: #999;
            margin-left: auto;
        }

        /* Статус бар */
        .status-bar {
            background: #f8f9fa;
            padding: 4px 12px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #6c757d;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.save {
            background: #4ecdc4;
            color: white;
        }

        .modal-btn.cancel {
            background: #e9ecef;
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <!-- Шапка -->
        <div class="browser-header">
            <div class="browser-logo">
                <h1>🔄 TUBUS</h1>
                <span>поиск+</span>
            </div>
            <div class="header-time" id="current-time"></div>
        </div>

        <!-- Панель навигации с АДРЕСНОЙ строкой -->
        <div class="nav-bar">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="goBack()" id="back-btn" disabled>←</button>
                <button class="nav-btn" onclick="goForward()" id="forward-btn" disabled>→</button>
                <button class="nav-btn" onclick="refresh()">↻</button>
                <button class="nav-btn" onclick="goHome()">🏠</button>
            </div>
            
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="Введите адрес сайта...">
                <button id="go-btn" onclick="navigateToUrl()">➡️</button>
            </div>
        </div>

        <!-- ОТДЕЛЬНАЯ ПОИСКОВАЯ СТРОКА -->
        <div class="search-section">
            <div class="search-label">
                🔍 ПОИСК В ИНТЕРНЕТЕ
                <span class="search-engine-badge" id="current-engine-badge">Google</span>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Что ищем? Например: погода Москва" autocomplete="off">
                <button id="search-btn" onclick="performSearch()">
                    <span>🔍</span> Найти
                </button>
            </div>

            <!-- Переключатели поисковых систем -->
            <div class="search-tabs">
                <button class="search-tab google active" onclick="switchSearchEngine('google')">
                    Google Поиск
                </button>
                <button class="search-tab yandex" onclick="switchSearchEngine('yandex')">
                    Яндекс Поиск
                </button>
            </div>
        </div>

        <!-- Закладки -->
        <div class="bookmarks-bar" id="bookmarks-bar">
            <div class="bookmark" onclick="openSite('https://www.google.com')">
                <span>🔍</span> Google
            </div>
            <div class="bookmark" onclick="openSite('https://yandex.ru')">
                <span>🔍</span> Яндекс
            </div>
            <div class="bookmark" onclick="openSite('https://www.youtube.com')">
                <span>▶️</span> YouTube
            </div>
            <div class="bookmark" onclick="openSite('https://vk.com')">
                <span>📱</span> VK
            </div>
            <button class="add-bookmark" onclick="showBookmarkModal()">+ Добавить</button>
        </div>

        <!-- Область просмотра (история поиска) -->
        <div class="browser-view" id="browser-view">
            <!-- Быстрый поиск -->
            <div class="quick-search">
                <div class="quick-card google-card" onclick="quickSearch('google', 'погода')">
                    <h3>☀️ Погода</h3>
                    <p>Узнать погоду</p>
                </div>
                <div class="quick-card yandex-card" onclick="quickSearch('yandex', 'новости')">
                    <h3>📰 Новости</h3>
                    <p>Главные новости</p>
                </div>
            </div>

            <!-- История поиска -->
            <div class="search-history" id="search-history">
                <div class="history-title">
                    <span>📋 Последние запросы</span>
                    <span onclick="clearHistory()" style="color: #999;">Очистить</span>
                </div>
                <div id="history-list">
                    <!-- Сюда будут добавляться запросы -->
                </div>
            </div>
        </div>

        <!-- Статус бар -->
        <div class="status-bar">
            <span id="current-status">Готов к поиску</span>
            <span id="connection-status">📶 online</span>
        </div>
    </div>

    <!-- Модальное окно для закладок -->
    <div class="modal" id="bookmark-modal">
        <div class="modal-content">
            <h3>➕ Новая закладка</h3>
            <input type="text" id="bookmark-name" placeholder="Название">
            <input type="text" id="bookmark-url" placeholder="Адрес сайта">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideBookmarkModal()">Отмена</button>
                <button class="modal-btn save" onclick="addBookmark()">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        let currentSearchEngine = 'google';
        let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [
            { name: 'Google', url: 'https://www.google.com' },
            { name: 'Яндекс', url: 'https://yandex.ru' },
            { name: 'YouTube', url: 'https://youtube.com' },
            { name: 'VK', url: 'https://vk.com' }
        ];
        let history = [];
        let currentIndex = -1;

        // ========== ВРЕМЯ ==========
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ========== ПОИСК (ОТДЕЛЬНАЯ СТРОКА) ==========
        function switchSearchEngine(engine) {
            currentSearchEngine = engine;
            
            // Обновляем табы
            document.querySelectorAll('.search-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.search-tab.${engine}`).classList.add('active');
            
            // Обновляем бейдж
            document.getElementById('current-engine-badge').textContent = 
                engine === 'google' ? 'Google' : 'Яндекс';
            
            // Фокус на поиск
            document.getElementById('search-input').focus();
            
            updateStatus(`Поиск: ${engine === 'google' ? 'Google' : 'Яндекс'}`);
        }

        function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            
            if (!query) {
                alert('Введите поисковый запрос!');
                return;
            }

            // Сохраняем в историю
            addToSearchHistory(query);
            
            // Формируем URL поиска
            let searchUrl;
            if (currentSearchEngine === 'google') {
                searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            } else {
                searchUrl = `https://yandex.ru/search/?text=${encodeURIComponent(query)}`;
            }
            
            // Открываем в новой вкладке
            window.open(searchUrl, '_blank');
            
            // Добавляем в историю навигации
            addToHistory(searchUrl);
            
            // Обновляем статус
            updateStatus(`Поиск: "${query}"`);
            
            // Очищаем поле (опционально)
            // document.getElementById('search-input').value = '';
        }

        function quickSearch(engine, query) {
            switchSearchEngine(engine);
            document.getElementById('search-input').value = query;
            performSearch();
        }

        // ========== ИСТОРИЯ ПОИСКА ==========
        function addToSearchHistory(query) {
            // Убираем дубликаты
            searchHistory = searchHistory.filter(q => q !== query);
            // Добавляем в начало
            searchHistory.unshift(query);
            // Ограничиваем 10 записями
            if (searchHistory.length > 10) searchHistory.pop();
            
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            updateSearchHistory();
        }

        function updateSearchHistory() {
            const historyList = document.getElementById('history-list');
            if (!historyList) return;
            
            if (searchHistory.length === 0) {
                historyList.innerHTML = '<div style="color:#999; padding:10px; text-align:center;">История пуста</div>';
                return;
            }
            
            let html = '';
            searchHistory.forEach(query => {
                html += `
                    <div class="history-item" onclick="repeatSearch('${query.replace(/'/g, "\\'")}')">
                        <span>🔍</span>
                        <span>${query}</span>
                        <small>только что</small>
                    </div>
                `;
            });
            historyList.innerHTML = html;
        }

        function repeatSearch(query) {
            document.getElementById('search-input').value = query;
            performSearch();
        }

        function clearHistory() {
            if (confirm('Очистить историю поиска?')) {
                searchHistory = [];
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                updateSearchHistory();
                updateStatus('История очищена');
            }
        }

        // ========== АДРЕСНАЯ СТРОКА ==========
        function navigateToUrl() {
            const url = document.getElementById('url-input')
