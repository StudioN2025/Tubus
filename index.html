<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUBUS - Простой браузер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .browser-container {
            width: 95%;
            max-width: 1400px;
            height: 95vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Шапка с названием */
        .browser-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .browser-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .browser-logo h1 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .browser-logo span {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        /* Панель инструментов */
        .toolbar {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            background: white;
            padding: 5px;
            border-radius: 25px;
            border: 1px solid #dee2e6;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            color: #495057;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #e9ecef;
            color: #212529;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Адресная строка */
        .address-bar {
            flex: 1;
            display: flex;
            gap: 10px;
            background: white;
            border-radius: 25px;
            padding: 5px 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }

        .address-bar:focus-within {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        #url-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            padding: 10px 0;
            color: #495057;
        }

        #go-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #4ecdc4;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #go-btn:hover {
            background: #f0f2f5;
            transform: scale(1.1);
        }

        /* Поисковые системы */
        .search-engines {
            display: flex;
            gap: 8px;
            background: white;
            padding: 5px;
            border-radius: 25px;
            border: 1px solid #dee2e6;
        }

        .search-engine {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: white;
            font-size: 14px;
        }

        .search-engine.google {
            background: #4285f4;
        }

        .search-engine.google:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }

        .search-engine.yandex {
            background: #ff0000;
        }

        .search-engine.yandex:hover {
            background: #cc0000;
            transform: translateY(-2px);
        }

        .search-engine.active {
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.5);
        }

        /* Панель закладок */
        .bookmarks-bar {
            background: white;
            padding: 10px 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
            align-items: center;
            overflow-x: auto;
        }

        .bookmark {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 15px;
            background: #f8f9fa;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            border: 1px solid #dee2e6;
        }

        .bookmark:hover {
            background: #e9ecef;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .bookmark.google {
            background: #4285f4;
            color: white;
            border: none;
        }

        .bookmark.yandex {
            background: #ff0000;
            color: white;
            border: none;
        }

        .bookmark-icon {
            font-size: 14px;
        }

        .add-bookmark {
            background: none;
            border: 2px dashed #ced4da;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: #6c757d;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 14px;
        }

        .add-bookmark:hover {
            border-color: #4ecdc4;
            color: #4ecdc4;
            background: #f8f9fa;
        }

        /* Область просмотра */
        .browser-view {
            flex: 1;
            background: white;
            position: relative;
        }

        #browser-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Статус бар */
        .status-bar {
            background: #f8f9fa;
            padding: 8px 20px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            color: #6c757d;
            font-size: 12px;
        }

        .status-left {
            display: flex;
            gap: 20px;
        }

        .loading {
            color: #4ecdc4;
            display: none;
        }

        .loading.active {
            display: inline;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .modal-btn.save {
            background: #4ecdc4;
            color: white;
        }

        .modal-btn.save:hover {
            background: #45b7b0;
            transform: translateY(-2px);
        }

        .modal-btn.cancel {
            background: #e9ecef;
            color: #495057;
        }

        .modal-btn.cancel:hover {
            background: #dee2e6;
        }

        /* Страница приветствия */
        .welcome-page {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .welcome-page h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .welcome-page p {
            font-size: 18px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <!-- Шапка с названием TUBUS -->
        <div class="browser-header">
            <div class="browser-logo">
                <h1>🔄 TUBUS</h1>
                <span>beta</span>
            </div>
        </div>

        <!-- Панель инструментов -->
        <div class="toolbar">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="goBack()" id="back-btn" disabled>←</button>
                <button class="nav-btn" onclick="goForward()" id="forward-btn" disabled>→</button>
                <button class="nav-btn" onclick="refresh()">↻</button>
                <button class="nav-btn" onclick="goHome()">🏠</button>
            </div>
            
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="Введите URL или поисковый запрос...">
                <button id="go-btn" onclick="navigate()">→</button>
            </div>

            <div class="search-engines">
                <button class="search-engine google active" onclick="setSearchEngine('google')">Google</button>
                <button class="search-engine yandex" onclick="setSearchEngine('yandex')">Яндекс</button>
            </div>
        </div>

        <!-- Панель закладок -->
        <div class="bookmarks-bar" id="bookmarks-bar">
            <div class="bookmark google" onclick="openInNewTab('https://www.google.com')">
                <span class="bookmark-icon">🔍</span>
                <span>Google</span>
            </div>
            <div class="bookmark yandex" onclick="openInNewTab('https://yandex.ru')">
                <span class="bookmark-icon">🔍</span>
                <span>Яндекс</span>
            </div>
            <button class="add-bookmark" onclick="showBookmarkModal()">+ Добавить закладку</button>
        </div>

        <!-- Область просмотра -->
        <div class="browser-view" id="browser-view">
            <!-- Вместо iframe используем открытие в новой вкладке -->
            <div class="welcome-page">
                <h2>Добро пожаловать в TUBUS! 👋</h2>
                <p>Введите адрес сайта в адресную строку или воспользуйтесь поиском</p>
                <p style="margin-top: 20px; font-size: 14px;">Сайты будут открываться в новой вкладке (из-за ограничений безопасности)</p>
            </div>
        </div>

        <!-- Статус бар -->
        <div class="status-bar">
            <div class="status-left">
                <span id="current-url">Готов к работе</span>
            </div>
            <span class="loading" id="loading">Загрузка...</span>
        </div>
    </div>

    <!-- Модальное окно для добавления закладки -->
    <div class="modal" id="bookmark-modal">
        <div class="modal-content">
            <h3>➕ Добавить закладку</h3>
            <input type="text" id="bookmark-name" placeholder="Название сайта" autocomplete="off">
            <input type="text" id="bookmark-url" placeholder="URL (например, github.com)" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideBookmarkModal()">Отмена</button>
                <button class="modal-btn save" onclick="addBookmark()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // Текущая поисковая система
        let currentSearchEngine = 'google';
        
        // История навигации
        let history = [];
        let currentIndex = -1;
        
        // Закладки
        let bookmarks = JSON.parse(localStorage.getItem('tubus-bookmarks')) || [
            { name: 'Google', url: 'https://www.google.com', color: 'google' },
            { name: 'Яндекс', url: 'https://yandex.ru', color: 'yandex' }
        ];

        // Инициализация
        window.onload = function() {
            updateBookmarksBar();
            updateStatus('TUBUS готов к работе');
        };

        // Обновление статуса
        function updateStatus(message) {
            document.getElementById('current-url').textContent = message;
        }

        // Установка поисковой системы
        function setSearchEngine(engine) {
            currentSearchEngine = engine;
            document.querySelectorAll('.search-engine').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.search-engine.${engine}`).classList.add('active');
            updateStatus(`Поисковая система: ${engine === 'google' ? 'Google' : 'Яндекс'}`);
        }

        // Открытие в новой вкладке (решение проблемы с iframe)
        function openInNewTab(url) {
            if (!url) return;
            
            // Добавляем протокол если его нет
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            window.open(url, '_blank');
            
            // Добавляем в историю
            addToHistory(url);
            document.getElementById('url-input').value = url;
            updateStatus(`Открыто: ${url}`);
        }

        // Навигация
        function navigate() {
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;

            let url;
            
            // Проверяем, является ли ввод URL
            const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
            if (urlPattern.test(input)) {
                url = input.startsWith('http') ? input : 'https://' + input;
                openInNewTab(url);
            } else {
                // Если не URL, выполняем поиск
                performSearch(input);
            }
        }

        // Выполнение поиска
        function performSearch(query) {
            const encodedQuery = encodeURIComponent(query);
            let searchUrl;
            
            if (currentSearchEngine === 'google') {
                searchUrl = `https://www.google.com/search?q=${encodedQuery}`;
            } else {
                searchUrl = `https://yandex.ru/search/?text=${encodedQuery}`;
            }
            
            openInNewTab(searchUrl);
            updateStatus(`Поиск: ${query}`);
        }

        // Добавление в историю
        function addToHistory(url) {
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(url);
            currentIndex = history.length - 1;
            updateNavButtons();
        }

        // Навигация назад
        function goBack() {
            if (currentIndex > 0) {
                currentIndex--;
                const url = history[currentIndex];
                openInNewTab(url);
                document.getElementById('url-input').value = url;
                updateNavButtons();
            }
        }

        // Навигация вперед
        function goForward() {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                const url = history[currentIndex];
                openInNewTab(url);
                document.getElementById('url-input').value = url;
                updateNavButtons();
            }
        }

        // Обновление страницы
        function refresh() {
            if (history[currentIndex]) {
                openInNewTab(history[currentIndex]);
            }
        }

        // Домой
        function goHome() {
            document.getElementById('url-input').value = '';
            updateStatus('Главная страница');
            // Здесь можно открыть стартовую страницу
        }

        // Обновление состояния кнопок навигации
        function updateNavButtons() {
            document.getElementById('back-btn').disabled = currentIndex <= 0;
            document.getElementById('forward-btn').disabled = currentIndex >= history.length - 1;
        }

        // Показать модальное окно для закладки
        function showBookmarkModal() {
            document.getElementById('bookmark-modal').classList.add('active');
            document.getElementById('bookmark-name').value = '';
            document.getElementById('bookmark-url').value = '';
        }

        // Скрыть модальное окно
        function hideBookmarkModal() {
            document.getElementById('bookmark-modal').classList.remove('active');
        }

        // Добавить закладку
        function addBookmark() {
            const name = document.getElementById('bookmark-name').value.trim();
            let url = document.getElementById('bookmark-url').value.trim();
            
            if (!name || !url) {
                alert('Пожалуйста, заполните все поля');
                return;
            }
            
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            // Проверяем, не существует ли уже такая закладка
            const exists = bookmarks.some(b => b.url === url);
            if (exists) {
                alert('Эта закладка уже существует');
                return;
            }
            
            bookmarks.push({ name, url, color: 'custom' });
            localStorage.setItem('tubus-bookmarks', JSON.stringify(bookmarks));
            updateBookmarksBar();
            hideBookmarkModal();
            updateStatus(`Закладка "${name}" добавлена`);
        }

        // Обновить панель закладок
        function updateBookmarksBar() {
            const bar = document.getElementById('bookmarks-bar');
            
            // Очищаем панель, оставляя только первые две и кнопку добавления
            while (bar.children.length > 3) {
                bar.removeChild(bar.lastChild);
            }
            
            // Добавляем остальные закладки
            bookmarks.forEach((bookmark, index) => {
                if (index < 2) return; // Пропускаем первые две (Google и Яндекс)
                
                const bookmarkEl = document.createElement('div');
                bookmarkEl.className = `bookmark ${bookmark.color || 'custom'}`;
                bookmarkEl.onclick = () => openInNewTab(bookmark.url);
                bookmarkEl.innerHTML = `
                    <span class="bookmark-icon">⭐</span>
                    <span>${bookmark.name}</span>
                `;
                
                // Добавляем перед кнопкой "Добавить закладку"
