<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TUBUS - Мобильный браузер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .browser-container {
            width: 100%;
            max-width: 1200px;
            height: 98vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Компактная шапка */
        .browser-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .browser-logo {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .browser-logo h1 {
            color: white;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .browser-logo span {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
        }

        .header-time {
            color: white;
            font-size: 12px;
            opacity: 0.9;
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 16px;
        }

        /* Компактная панель инструментов */
        .toolbar {
            background: #f8f9fa;
            padding: 8px 10px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 2px;
            background: white;
            padding: 3px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 18px;
            color: #495057;
            transition: all 0.2s;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:active {
            background: #e9ecef;
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Компактная адресная строка */
        .address-bar {
            flex: 1;
            display: flex;
            gap: 6px;
            background: white;
            border-radius: 22px;
            padding: 2px 10px;
            border: 2px solid #e9ecef;
            transition: all 0.2s;
            min-width: 140px;
        }

        .address-bar:focus-within {
            border-color: #4ecdc4;
        }

        #url-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 13px;
            padding: 8px 0;
            color: #495057;
            background: transparent;
        }

        #go-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #4ecdc4;
            padding: 6px 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #go-btn:active {
            background: #f0f2f5;
            transform: scale(1.1);
        }

        /* Компактные поисковые системы */
        .search-engines {
            display: flex;
            gap: 4px;
            background: white;
            padding: 3px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
        }

        .search-engine {
            padding: 4px 12px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: white;
            font-size: 12px;
            white-space: nowrap;
        }

        .search-engine.google {
            background: #4285f4;
        }

        .search-engine.google:active {
            background: #3367d6;
            transform: scale(0.95);
        }

        .search-engine.yandex {
            background: #ff0000;
        }

        .search-engine.yandex:active {
            background: #cc0000;
            transform: scale(0.95);
        }

        .search-engine.active {
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.5);
        }

        /* Компактная панель закладок */
        .bookmarks-bar {
            background: white;
            padding: 6px 10px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 6px;
            align-items: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .bookmarks-bar::-webkit-scrollbar {
            height: 2px;
        }

        .bookmarks-bar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .bookmark {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: #f8f9fa;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid #dee2e6;
            font-size: 12px;
        }

        .bookmark:active {
            background: #e9ecef;
            transform: translateY(-1px);
        }

        .bookmark.google {
            background: #4285f4;
            color: white;
            border: none;
        }

        .bookmark.yandex {
            background: #ff0000;
            color: white;
            border: none;
        }

        .bookmark-icon {
            font-size: 12px;
        }

        .add-bookmark {
            background: none;
            border: 2px dashed #ced4da;
            padding: 4px 10px;
            border-radius: 16px;
            cursor: pointer;
            color: #6c757d;
            transition: all 0.2s;
            white-space: nowrap;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .add-bookmark:active {
            border-color: #4ecdc4;
            color: #4ecdc4;
            background: #f8f9fa;
        }

        /* Область просмотра */
        .browser-view {
            flex: 1;
            background: white;
            position: relative;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Компактный статус бар */
        .status-bar {
            background: #f8f9fa;
            padding: 4px 12px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            color: #6c757d;
            font-size: 11px;
        }

        .status-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .loading {
            color: #4ecdc4;
            display: none;
        }

        .loading.active {
            display: inline;
        }

        /* Модальное окно для мобильных */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: #333;
            font-size: 18px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            margin-bottom: 12px;
            font-size: 14px;
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 14px;
            flex: 1;
        }

        .modal-btn:active {
            transform: scale(0.97);
        }

        .modal-btn.save {
            background: #4ecdc4;
            color: white;
        }

        .modal-btn.save:active {
            background: #45b7b0;
        }

        .modal-btn.cancel {
            background: #e9ecef;
            color: #495057;
        }

        .modal-btn.cancel:active {
            background: #dee2e6;
        }

        /* Страница приветствия для мобильных */
        .welcome-page {
            height: 100%;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .welcome-page h2 {
            font-size: 32px;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .welcome-page p {
            font-size: 14px;
            opacity: 0.9;
            max-width: 280px;
            line-height: 1.5;
        }

        .welcome-page .hint {
            margin-top: 24px;
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
        }

        /* Медиа-запросы для очень маленьких экранов */
        @media (max-width: 380px) {
            .toolbar {
                padding: 6px 8px;
            }
            
            .nav-btn {
                padding: 4px 8px;
                font-size: 14px;
                min-width: 32px;
            }
            
            .search-engine {
                padding: 3px 8px;
                font-size: 11px;
            }
            
            .address-bar {
                padding: 2px 6px;
            }
            
            #url-input {
                font-size: 12px;
                padding: 6px 0;
            }
            
            .browser-logo h1 {
                font-size: 16px;
            }
            
            .bookmark {
                padding: 3px 8px;
                font-size: 11px;
            }
        }

        /* Для планшетов */
        @media (min-width: 768px) {
            .browser-container {
                height: 95vh;
            }
            
            .toolbar {
                padding: 12px 16px;
            }
            
            #url-input {
                font-size: 14px;
            }
            
            .welcome-page h2 {
                font-size: 48px;
            }
            
            .welcome-page p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <!-- Компактная шапка с временем -->
        <div class="browser-header">
            <div class="browser-logo">
                <h1>🔄 TUBUS</h1>
                <span>mobile</span>
            </div>
            <div class="header-time" id="current-time"></div>
        </div>

        <!-- Компактная панель инструментов -->
        <div class="toolbar">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="goBack()" id="back-btn" disabled>←</button>
                <button class="nav-btn" onclick="goForward()" id="forward-btn" disabled>→</button>
                <button class="nav-btn" onclick="refresh()">↻</button>
                <button class="nav-btn" onclick="goHome()">🏠</button>
            </div>
            
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="Поиск или адрес...">
                <button id="go-btn" onclick="navigate()">→</button>
            </div>
        </div>

        <!-- Поисковые системы (вынесены отдельно для компактности) -->
        <div style="padding: 4px 10px; background: #f8f9fa; border-bottom: 1px solid #dee2e6;">
            <div class="search-engines" style="width: fit-content;">
                <button class="search-engine google active" onclick="setSearchEngine('google')">Google</button>
                <button class="search-engine yandex" onclick="setSearchEngine('yandex')">Яндекс</button>
            </div>
        </div>

        <!-- Компактная панель закладок -->
        <div class="bookmarks-bar" id="bookmarks-bar">
            <div class="bookmark google" onclick="openInNewTab('https://www.google.com')">
                <span class="bookmark-icon">G</span>
                <span>Google</span>
            </div>
            <div class="bookmark yandex" onclick="openInNewTab('https://yandex.ru')">
                <span class="bookmark-icon">Я</span>
                <span>Яндекс</span>
            </div>
            <button class="add-bookmark" onclick="showBookmarkModal()">
                <span>+</span> <span class="bookmark-text">Добавить</span>
            </button>
        </div>

        <!-- Область просмотра -->
        <div class="browser-view" id="browser-view">
            <div class="welcome-page">
                <h2>👋 TUBUS</h2>
                <p>Введите адрес сайта или поисковый запрос</p>
                <p class="hint">⬆️ Сайты открываются в новой вкладке</p>
            </div>
        </div>

        <!-- Компактный статус бар -->
        <div class="status-bar">
            <div class="status-left">
                <span id="current-url">Готов к работе</span>
                <span class="loading" id="loading">⏳</span>
            </div>
            <span id="connection-status">📶 online</span>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="bookmark-modal">
        <div class="modal-content">
            <h3>➕ Новая закладка</h3>
            <input type="text" id="bookmark-name" placeholder="Название" autocomplete="off">
            <input type="text" id="bookmark-url" placeholder="Ссылка (site.com)" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideBookmarkModal()">Отмена</button>
                <button class="modal-btn save" onclick="addBookmark()">OK</button>
            </div>
        </div>
    </div>

    <script>
        // Текущая поисковая система
        let currentSearchEngine = 'google';
        
        // История
        let history = [];
        let currentIndex = -1;
        
        // Закладки
        let bookmarks = JSON.parse(localStorage.getItem('tubus-bookmarks')) || [
            { name: 'Google', url: 'https://www.google.com', color: 'google' },
            { name: 'Яндекс', url: 'https://yandex.ru', color: 'yandex' }
        ];

        // Обновление времени
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false 
            });
            document.getElementById('current-time').textContent = timeStr;
        }

        // Инициализация
        window.onload = function() {
            updateBookmarksBar();
            updateStatus('TUBUS mobile');
            updateTime();
            setInterval(updateTime, 60000); // Обновляем время каждую минуту
            
            // Проверка соединения
            window.addEventListener('online', () => {
                document.getElementById('connection-status').textContent = '📶 online';
            });
            window.addEventListener('offline', () => {
                document.getElementById('connection-status').textContent = '📴 offline';
            });
        };

        function updateStatus(message) {
            document.getElementById('current-url').textContent = message;
        }

        function setSearchEngine(engine) {
            currentSearchEngine = engine;
            document.querySelectorAll('.search-engine').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.search-engine.${engine}`).classList.add('active');
            updateStatus(`Поиск: ${engine === 'google' ? 'Google' : 'Яндекс'}`);
        }

        function openInNewTab(url) {
            if (!url) return;
            
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            window.open(url, '_blank');
            
            addToHistory(url);
            document.getElementById('url-input').value = url;
            updateStatus(url.substring(0, 40) + (url.length > 40 ? '...' : ''));
            
            // Показываем индикатор загрузки
            document.getElementById('loading').classList.add('active');
            setTimeout(() => {
                document.getElementById('loading').classList.remove('active');
            }, 1000);
        }

        function navigate() {
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;

            const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
            
            if (urlPattern.test(input)) {
                let url = input.startsWith('http') ? input : 'https://' + input;
                openInNewTab(url);
            } else {
                performSearch(input);
            }
            
            // Скрываем клавиатуру на мобильных
            document.getElementById('url-input').blur();
        }

        function performSearch(query) {
            const encodedQuery = encodeURIComponent(query);
            let searchUrl;
            
            if (currentSearchEngine === 'google') {
                searchUrl = `https://www.google.com/search?q=${encodedQuery}`;
            } else {
                searchUrl = `https://yandex.ru/search/?text=${encodedQuery}`;
            }
            
            openInNewTab(searchUrl);
        }

        function addToHistory(url) {
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(url);
            currentIndex = history.length - 1;
            updateNavButtons();
        }
